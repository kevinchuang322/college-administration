<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>115 年大學二階甄試審查資料查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; }
        .requirement-card { transition: all 0.3s ease; }
        .info-link { color: #2563eb; text-decoration: underline; font-weight: 500; }
        .pdf-btn { display: inline-flex; align-items: center; padding: 0.5rem 1rem; background-color: #2563eb; color: white; border-radius: 0.5rem; font-weight: 500; text-decoration: none; }
        .pdf-btn:hover { background-color: #1d4ed8; }
        
        .tab-btn { transition: all 0.2s; color: #64748b; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: #2563eb; border-color: #2563eb; background-color: #eff6ff; }

        /* --- A4 單頁列印優化樣式 --- */
        @media print {
            header, .no-print, #placeholder, .tab-btn, .bg-slate-200\/50, .update-banner { display: none !important; }
            body { background-color: white !important; padding: 0 !important; margin: 0 !important; font-size: 12px; }
            #resultDisplay { display: block !important; width: 100%; }
            .tab-content { display: block !important; opacity: 1 !important; margin-bottom: 15px; }
            h2 { font-size: 16px !important; color: black !important; border-left: 3px solid #334155 !important; padding-left: 0.5rem; margin: 10px 0 !important; }
            h3 { font-size: 14px !important; margin-bottom: 5px !important; }
            .requirement-card { border: 1px solid #e2e8f0 !important; padding: 8px !important; margin-bottom: 8px !important; break-inside: avoid; box-shadow: none !important; background: white !important; }
            .grid { display: block !important; }
            .p-2 { padding: 4px !important; }
            .mb-3, .mb-4, .mb-6, .mb-8, .mb-10 { margin-bottom: 4px !important; }
            .space-y-10 > :not([hidden]) ~ :not([hidden]) { margin-top: 10px !important; }
            .pdf-btn { background: none !important; color: black !important; border: 1px solid #ccc !important; font-size: 10px; }
            @page { size: A4; margin: 1cm; }
        }
    </style>
</head>
<body class="pb-10 px-4 md:px-10">

    <div class="update-banner no-print w-full bg-amber-100 border-b border-amber-200 py-3 mb-6">
        <div class="max-w-5xl mx-auto px-4 flex items-center justify-center gap-2 text-amber-800 font-bold">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
            115大學個申二階指定項目甄試資料持續更新中，預計於115年3月21日 18:00更新完畢，屆時系統正常使用，惟資料可能仍有疏漏之處。
        </div>
    </div>

    <div class="max-w-5xl mx-auto">
        <header class="mb-10 text-center no-print">
            <h1 class="text-3xl font-bold text-slate-800 mb-2">115 年大學二階甄試審查資料查詢系統</h1>
            <p class="text-slate-500">資料來源：各校系網站、大學甄選入學委員會</p>
        </header>

        <div class="no-print bg-white p-6 rounded-xl shadow-sm border border-slate-200 mb-8 flex flex-col md:flex-row gap-4">
            <div class="flex-1">
                <label class="block text-sm font-medium text-slate-700 mb-2">1. 選擇大學</label>
                <select id="universitySelect" class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-blue-500">
                    <option value="">-- 請選擇大學 --</option>
                </select>
            </div>
            <div class="flex-1">
                <label class="block text-sm font-medium text-slate-700 mb-2">2. 選擇科系</label>
                <select id="departmentSelect" disabled class="w-full p-2.5 bg-slate-50 border border-slate-300 rounded-lg focus:ring-blue-500 disabled:opacity-50">
                    <option value="">-- 請先選擇大學 --</option>
                </select>
            </div>
        </div>

        <div id="resultDisplay" class="hidden">
            <div class="flex items-center justify-between mb-6 border-b border-slate-200 pb-4">
                <h2 id="displayTitle" class="text-xl md:text-2xl font-bold text-blue-900"></h2>
                <button onclick="window.print()" class="no-print flex items-center gap-2 px-4 py-2 bg-slate-800 text-white rounded-lg hover:bg-slate-700 transition">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"></path></svg>
                    匯出完整資料
                </button>
            </div>

            <div class="no-print flex gap-1 mb-8 bg-slate-200/50 p-1 rounded-xl">
                <button onclick="switchTab('tab-info')" id="btn-info" class="tab-btn active flex-1 py-3 px-2 rounded-lg font-bold text-center">基本資料</button>
                <button onclick="switchTab('tab-portfolio')" id="btn-portfolio" class="tab-btn flex-1 py-3 px-2 rounded-lg font-bold text-center">一、學習歷程</button>
                <button onclick="switchTab('tab-interview')" id="btn-interview" class="tab-btn flex-1 py-3 px-2 rounded-lg font-bold text-center">二、面試資訊</button>
                <button onclick="switchTab('tab-senior')" id="btn-senior" class="tab-btn flex-1 py-3 px-2 rounded-lg font-bold text-center">學長姐傳承</button>
            </div>

            <div id="tab-info" class="tab-content space-y-6">
                <h2 class="hidden print:block text-xl font-bold border-l-4 border-slate-700 pl-3">【校系基本資料】</h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="bg-white p-5 rounded-lg border border-slate-200 requirement-card md:col-span-1">
                        <h3 class="font-bold text-slate-800 mb-2 border-b pb-1">校系資訊</h3>
                        <div id="info_basic" class="text-sm space-y-2 text-slate-600"></div>
                    </div>
                    <div class="bg-white p-5 rounded-lg border border-slate-200 requirement-card md:col-span-2">
                        <h3 class="font-bold text-slate-800 mb-2 border-b pb-1">學系特色</h3>
                        <div id="info_feature" class="text-sm text-slate-600 whitespace-pre-line"></div>
                    </div>
                    <div class="bg-white p-5 rounded-lg border border-slate-200 requirement-card md:col-span-3">
                        <h3 class="font-bold text-slate-800 mb-2 border-b pb-1">畢業出路</h3>
                        <div id="info_career" class="text-sm text-slate-600 whitespace-pre-line"></div>
                    </div>
                </div>
            </div>

            <div id="tab-portfolio" class="tab-content hidden space-y-10">
                <h2 class="hidden print:block text-xl font-bold border-l-4 border-blue-500 pl-3">【一、學習歷程】</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <section class="bg-white p-5 rounded-lg border border-slate-200 requirement-card">
                        <h3 class="font-bold text-lg text-slate-800 mb-4 border-b pb-2">1. 修課紀錄</h3>
                        <div class="text-sm text-slate-600" id="cat1"></div>
                    </section>
                    <section class="bg-white p-5 rounded-lg border border-slate-200 requirement-card">
                        <h3 class="font-bold text-lg text-slate-800 mb-4 border-b pb-2">2. 課程學習成果</h3>
                        <div class="text-sm text-slate-600" id="cat2"></div>
                    </section>
                    <section class="bg-white p-5 rounded-lg border border-slate-200 requirement-card md:col-span-2">
                        <h3 class="font-bold text-lg text-slate-800 mb-4 border-b pb-2">3. 多元表現</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-x-6 text-sm text-slate-600" id="cat3"></div>
                    </section>
                    <section class="bg-blue-50 p-5 rounded-lg border border-blue-200 requirement-card md:col-span-2">
                        <h3 class="font-bold text-lg text-blue-900 mb-4 border-b border-blue-200 pb-2">4. 學習歷程自述</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 text-sm text-slate-700" id="cat4"></div>
                    </section>
                    <section class="bg-white p-5 rounded-lg border border-slate-200 requirement-card md:col-span-2">
                        <h3 class="font-bold text-lg text-slate-800 mb-4 border-b pb-2">5. 其他</h3>
                        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 text-sm text-slate-600" id="cat5"></div>
                    </section>
                </div>
            </div>

            <div id="tab-interview" class="tab-content hidden space-y-10">
                <h2 class="hidden print:block text-xl font-bold border-l-4 border-emerald-500 pl-3">【二、面試資訊】</h2>
                <div class="grid grid-cols-1 gap-6">
                    <section class="bg-emerald-50 p-5 rounded-lg border border-emerald-200 requirement-card">
                        <h3 class="font-bold text-lg text-emerald-900 mb-4 border-b border-emerald-200 pb-2">面試詳情</h3>
                        <div class="grid grid-cols-1 gap-4 text-sm text-slate-700">
                            <div id="interview_date_display"></div>
                            <div id="interview_guide_display"></div>
                        </div>
                    </section>
                </div>
            </div>

            <div id="tab-senior" class="tab-content hidden space-y-6 no-print">
                <h2 class="text-xl font-bold border-l-4 border-amber-500 pl-3 text-slate-800">【學長姐傳承專區】</h2>
                <div class="bg-amber-50 p-6 rounded-lg border border-amber-200 requirement-card">
                    <h3 class="font-bold text-lg text-amber-900 mb-4 border-b border-amber-200 pb-2 flex items-center gap-2">
                        <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10.394 2.827a1 1 0 00-1.388 0L2.73 9.14a1 1 0 000 1.414l6.276 6.313a1 1 0 001.388 0l6.276-6.313a1 1 0 000-1.414l-6.276-6.313z"></path></svg>
                        優良學習歷程範本
                    </h3>
                    <div id="senior_links_display" class="grid grid-cols-1 gap-4 text-sm">
                    </div>
                </div>
            </div>
        </div>
        
        <div id="placeholder" class="no-print py-20 text-center text-slate-400">
            <svg class="mx-auto h-12 w-12 mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" /></svg>
            <p>請從上方選單選擇校系以查看資料</p>
        </div>
    </div>

    <a href="https://forms.gle/cDURcQbLZDXh7tFS7" target="_blank" class="no-print fixed bottom-8 right-8 bg-blue-600 text-white w-14 h-14 rounded-full shadow-lg flex items-center justify-center hover:bg-blue-700 transition-all hover:scale-110 group" title="上傳範本分享">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
        <span class="absolute right-16 bg-slate-800 text-white px-2 py-1 rounded text-sm opacity-0 group-hover:opacity-100 whitespace-nowrap transition-opacity">上傳學長姐優秀歷程</span>
    </a>

    <script>
        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(tabId).classList.remove('hidden');
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            const btnId = 'btn-' + tabId.split('-')[1];
            document.getElementById(btnId).classList.add('active');
        }

        const universityData = {
            "高雄醫學大學": {
                departments: [{
                    name: "醫務管理暨醫療資訊學系",
                    code: "",
                    website: "",

            },
            "中國醫藥大學": {

                    name: "醫療資訊學系",

                }]
            },
            "國立中正大學": {
                departments: [{
                    name: "資訊管理學系",
                    code: "013322",
                    website: "https://mis.ccu.edu.tw/",
                    collego: "",
                    feature: "整合資訊技術與管理科學...",
                    career: "軟體工程師...",
                    A: ``,

                    P: ``,

                    interviewDate: `2026年5月15日 (五)`,
                    interviewGuide: `https://ccuap.ccu.edu.tw/var/file/33/1033/img/2151/B5-5-5.pdf`,
                    seniorLinks: [
                        { title: "中山資訊管理學系_多元表現綜整心得", url: "https://drive.google.com/file/d/1UrKrt8WdkqXC6NXrazw3LEoSKwxF0df-/view?usp=drive_link" }
                    ]
                }]
            },
            "國立彰化師範大學": {
                departments: [{
                    name: "資訊管理學系資訊管理組",
                    code: "",
                    website: "",
                    collego: "",
                    feature: "",

                }]
            },
            "國立中山大學": {
                departments: [{
                    name: "企業管理學系",
                    code: "",

                }]
            },
            "國立中興大學": {
                departments: [{
                    name: "智慧創意工程學士學位學程",
                    code: "",

                    collego: "",
                    feature: "",

                    S: ``,
                    T: ``,
                    interviewDate: ``,
                    interviewGuide: ``,
                    seniorLinks: []
                }]
            }
        };

        const uniSelect = document.getElementById('universitySelect');
        const deptSelect = document.getElementById('departmentSelect');
        const resultDisplay = document.getElementById('resultDisplay');
        const placeholder = document.getElementById('placeholder');
        const displayTitle = document.getElementById('displayTitle');

        Object.keys(universityData).forEach(uni => {
            const opt = document.createElement('option');
            opt.value = uni; opt.textContent = uni;
            uniSelect.appendChild(opt);
        });

        uniSelect.addEventListener('change', () => {
            const uniName = uniSelect.value;
            deptSelect.innerHTML = '<option value="">-- 請選擇科系 --</option>';
            if (uniName) {
                deptSelect.disabled = false;
                universityData[uniName].departments.forEach(dept => {
                    const opt = document.createElement('option');
                    opt.value = dept.name; opt.textContent = dept.name;
                    deptSelect.appendChild(opt);
                });
            } else {
                deptSelect.disabled = true;
                resultDisplay.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }
        });

        deptSelect.addEventListener('change', () => {
            const uniName = uniSelect.value;
            const deptName = deptSelect.value;
            if (uniName && deptName) {
                const data = universityData[uniName].departments.find(d => d.name === deptName);
                renderData(uniName, data);
            }
        });

        function renderData(uni, data) {
            placeholder.classList.add('hidden');
            resultDisplay.classList.remove('hidden');
            displayTitle.textContent = `${uni} - ${data.name}`;
            switchTab('tab-info');

            document.getElementById('info_basic').innerHTML = `
                <p><strong>校系代碼：</strong>${data.code || '---'}</p>
                <p><strong>學系官網：</strong>${data.website ? `<a href="${data.website}" target="_blank" class="info-link">點此前往</a>` : '---'}</p>
                <p><strong>Collego：</strong>${data.collego ? `<a href="${data.collego}" target="_blank" class="info-link">查看介紹</a>` : '---'}</p>
            `;
            document.getElementById('info_feature').textContent = data.feature || '暫無資料';
            document.getElementById('info_career').textContent = data.career || '暫無資料';

            const formatItem = (label, value, isGuide = false) => {
                let content = value || '<span class="text-slate-300 text-xs italic">未特別要求 / 待填寫</span>';
                let isUrl = isGuide && value && value.startsWith('http');
                if (isUrl) {
                    content = `<a href="${value}" target="_blank" class="pdf-btn"><svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>點此查看面試指引 PDF</a>`;
                }
                return `
                <div class="flex flex-col mb-3">
                    <span class="font-bold text-slate-700">${label}</span>
                    <div class="p-2 bg-slate-50 border-l-4 border-slate-300 min-h-[1.5rem] ${isUrl ? '' : 'whitespace-pre-line'} text-slate-600">${content}</div>
                </div>`;
            };

            document.getElementById('cat1').innerHTML = formatItem('A. 修課紀錄', data.A);
            document.getElementById('cat2').innerHTML = formatItem('B. 書面報告', data.B) + formatItem('C. 實作作品', data.C);
            document.getElementById('cat3').innerHTML = formatItem('F. 高中自主學習計畫', data.F) + formatItem('G. 社團活動', data.G) + formatItem('N. 多元表現綜整心得', data.N);
            document.getElementById('cat4').innerHTML = formatItem('O. 學習歷程反思', data.O) + formatItem('P. 就讀動機', data.P) + formatItem('Q. 未來規劃', data.Q);
            document.getElementById('cat5').innerHTML = formatItem('R. 其他', data.R) + formatItem('S. 其他', data.S);
            document.getElementById('interview_date_display').innerHTML = formatItem('面試日期', data.interviewDate);
            document.getElementById('interview_guide_display').innerHTML = formatItem('面試準備指引', data.interviewGuide, true);

            const seniorDisplay = document.getElementById('senior_links_display');
            if (data.seniorLinks && data.seniorLinks.length > 0) {
                seniorDisplay.innerHTML = data.seniorLinks.map(link => `
                    <a href="${link.url}" target="_blank" class="flex items-center justify-between p-3 bg-white border border-amber-100 rounded-lg hover:shadow-md transition text-slate-700">
                        <span class="font-medium">${link.title}</span>
                        <span class="text-blue-600 flex items-center gap-1">點此查看 <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg></span>
                    </a>
                `).join('');
            } else {
                seniorDisplay.innerHTML = '<p class="text-amber-600 italic">目前尚無學長姐分享資料，歡迎點擊右下角按鈕提供！</p>';
            }
        }

</body>

</html>
