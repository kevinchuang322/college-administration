        const uniSelect = document.getElementById('universitySelect');
        const deptSelect = document.getElementById('departmentSelect');
        const resultDisplay = document.getElementById('resultDisplay');
        const placeholder = document.getElementById('placeholder');
        const displayTitle = document.getElementById('displayTitle');
        const statusBadge = document.getElementById('statusBadge');

        // 初始化大學選單
        Object.keys(universityData).forEach(uni => {
            const opt = document.createElement('option');
            opt.value = uni; opt.textContent = uni;
            uniSelect.appendChild(opt);
        });

        uniSelect.addEventListener('change', () => {
            const uniName = uniSelect.value;
            deptSelect.innerHTML = '<option value="">-- 請選擇科系 --</option>';
            if (uniName) {
                deptSelect.disabled = false;
                universityData[uniName].departments.forEach(dept => {
                    const opt = document.createElement('option');
                    opt.value = dept.name; 
                    opt.textContent = `${dept.name} ${dept.status === 'passed' ? '(通過)' : '(未通過)'}`;
                    deptSelect.appendChild(opt);
                });
            } else {
                deptSelect.disabled = true;
                resultDisplay.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }
        });

        deptSelect.addEventListener('change', () => {
            const uniName = uniSelect.value;
            const deptName = deptSelect.value;
            if (uniName && deptName) {
                const data = universityData[uniName].departments.find(d => d.name === deptName);
                renderData(uniName, data);
            }
        });

        function renderData(uni, data) {
            placeholder.classList.add('hidden');
            resultDisplay.classList.remove('hidden');
            displayTitle.textContent = `${uni} - ${data.name}`;
            
            // 處理狀態標籤
            if (data.status === 'passed') {
                statusBadge.textContent = "【第一階段通過】";
                statusBadge.className = "mt-1 font-bold text-sm text-blue-600";
                
                // 顯示二階日程
                document.getElementById('scheduleSection').classList.remove('hidden');
                document.getElementById('schedule_content').innerHTML = `
                    <div class="space-y-1">
                        <p><strong>🗓️ 面試日期：</strong><span class="text-blue-700 font-bold">${data.schedule.date}</span></p>
                        <p><strong>📍 面試地點：</strong>${data.schedule.location}</p>
                        <p><strong>💰 甄試費用：</strong>${data.schedule.fee}</p>
                    </div>
                    <div class="space-y-1">
                        <p><strong>⏳ 繳費期限：</strong>${data.schedule.payment}</p>
                        <p><strong>📁 資料上傳：</strong>${data.schedule.docs}</p>
                        <p class="text-xs text-amber-600 font-medium whitespace-pre-line">${data.schedule.note}</p>
                    </div>
                `;
            } else {
                statusBadge.textContent = "【第一階段未通過】";
                statusBadge.className = "mt-1 font-bold text-sm text-red-600";
                document.getElementById('scheduleSection').classList.add('hidden');
            }

            switchTab('tab-info');

            // 渲染基本資料
            document.getElementById('info_basic').innerHTML = `
                <p><strong>校系代碼：</strong>${data.code || '---'}</p>
                <p><strong>學系官網：</strong>${data.website ? `<a href="${data.website}" target="_blank" class="info-link">點此前往</a>` : '---'}</p>
                <p><strong>Collego：</strong>${data.collego ? `<a href="${data.collego}" target="_blank" class="info-link">查看介紹</a>` : '---'}</p>
            `;
            document.getElementById('info_feature').textContent = data.feature || '暫無資料';
            document.getElementById('info_career').textContent = data.career || '暫無資料';

            // 渲染學習歷程區
            const formatItem = (label, value) => {
                let content = value || '<span class="text-slate-300 text-xs italic">未特別要求 / 待填寫</span>';
                return `
                <div class="flex flex-col mb-2">
                    <span class="font-bold text-slate-700">${label}</span>
                    <div class="p-2 bg-slate-50 border-l-4 border-slate-300 whitespace-pre-line text-slate-600">${content}</div>
                </div>`;
            };

            document.getElementById('cat1').innerHTML = formatItem('A. 修課紀錄', data.A);
            document.getElementById('cat2').innerHTML = formatItem('B. 書面報告', data.B) + formatItem('C. 實作作品', data.C);
            document.getElementById('cat3').innerHTML = formatItem('F. 高中自主學習', data.F) + formatItem('G. 社團活動', data.G) + formatItem('N. 多元表現綜整', data.N);
            document.getElementById('cat4').innerHTML = formatItem('O. 學習反思', data.O) + formatItem('P. 就讀動機', data.P) + formatItem('Q. 未來規劃', data.Q);
// --- 1. 更新 其他資料區 (cat5) 並加入網址偵測 ---
            const otherFields = [
                { label: '其他資料(R)', value: data.R },
                { label: '其他資料(S)', value: data.S },
                { label: '其他資料(T)', value: data.T }
            ];

            document.getElementById('cat5').innerHTML = otherFields.map(item => {
                if (!item.value || item.value.trim() === "") return ""; // 沒資料不顯示
                
                const isUrl = item.value.trim().startsWith('http');
                const displayContent = isUrl 
                    ? `<a href="${item.value.trim()}" target="_blank" class="pdf-btn w-full justify-center mt-2 shadow-sm">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        查看參考文件 (PDF/網頁)
                       </a>`
                    : `<div class="whitespace-pre-line text-slate-600">${item.value}</div>`;

                return `
                    <div class="p-3 bg-slate-50 rounded-lg border border-slate-200 mb-2">
                        <span class="block font-bold text-slate-700 mb-2">${item.label}</span>
                        ${displayContent}
                    </div>`;
            }).join('');

            // --- 2. 渲染面試區 (日期與指引) ---
            document.getElementById('interview_date_display').innerHTML = formatItem('面試日期 (簡章資料)', data.interviewDate);
            
            const interviewGuideEl = document.getElementById('interview_guide_display');
            if (data.interviewGuide && data.interviewGuide.startsWith('http')) {
                interviewGuideEl.innerHTML = `
                    <a href="${data.interviewGuide}" target="_blank" class="pdf-btn w-full justify-center shadow-md">
                        <svg class="w-4 h-4 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg>
                        點此查看官方面試準備指引
                    </a>`;
            } else {
                interviewGuideEl.innerHTML = data.interviewGuide ? 
                    `<div class="p-3 bg-blue-50 border border-blue-100 rounded text-blue-800 text-sm">${data.interviewGuide}</div>` : 
                    '<p class="text-slate-400 italic text-sm">暫無面試指引檔案</p>';
            }

            // --- 3. 處理學長姐分享 (seniorLinks) ---
            const seniorDisplay = document.getElementById('senior_links_display');
            if (data.seniorLinks && data.seniorLinks.length > 0) {
                seniorDisplay.innerHTML = data.seniorLinks.map(link => `
                    <a href="${link.url}" target="_blank" class="flex items-center justify-between p-3 bg-white border border-amber-100 rounded-lg hover:shadow-md transition text-slate-700 mb-2">
                        <span class="font-medium text-sm">${link.title}</span>
                        <span class="text-blue-600 text-xs flex items-center gap-1 shrink-0 ml-2">點此查看 <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path></svg></span>
                    </a>
                `).join('');
            } else {
                seniorDisplay.innerHTML = '<p class="text-amber-600 italic text-sm text-center py-4">目前尚無學長姐分享資料</p>';
            }
            document.getElementById('interview_date_display').innerHTML = formatItem('面試日期 (簡章資料)', data.interviewDate);
            document.getElementById('interview_guide_display').innerHTML = data.interviewGuide ? 
                `<a href="${data.interviewGuide}" target="_blank" class="pdf-btn">點此查看面試準備指引</a>` : 
                '<p class="text-slate-400 italic text-sm">暫無面試指引檔案</p>';
        }
    </script>
